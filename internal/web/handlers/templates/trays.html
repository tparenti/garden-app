{{define "content"}}
<div class="space-y-4">

  <!-- Page hero -->
  <div class="rounded-xl bg-gradient-to-r from-blue-900 to-stone-800 border border-stone-700 px-6 py-5 flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold text-white">Germination Trays</h1>
      <p class="text-stone-300 text-sm mt-0.5">Track seedling germination</p>
    </div>
    <div class="flex items-center gap-4">
      <div class="text-4xl select-none">🌱 💧 🔬</div>
      <a href="/trays/new" class="bg-green-600 text-white text-sm px-4 py-2 rounded-lg hover:bg-green-700 transition-colors">+ New Tray</a>
    </div>
  </div>

  {{if .Trays}}
  <div class="bg-stone-50 rounded-xl border border-gray-200 overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-stone-100 text-gray-500 text-xs uppercase border-b border-gray-200">
        <tr>
          <th class="px-5 py-3 text-left">Name</th>
          <th class="px-5 py-3 text-left">Size</th>
          <th class="px-5 py-3 text-left">Created</th>
          <th class="px-5 py-3 text-left"></th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-100">
        {{range .Trays}}
        <tr id="tray-row-{{.ID}}" class="hover:bg-stone-100 transition-colors">
          <td class="px-5 py-3 font-medium text-gray-800">
            <a href="/trays/{{.ID}}" class="hover:text-green-600 hover:underline">{{.Name}}</a>
          </td>
          <td class="px-5 py-3 text-gray-500">{{.Rows}} × {{.Cols}} cells</td>
          <td class="px-5 py-3 text-gray-400">{{formatDate .CreatedAt}}</td>
          <td class="px-5 py-3 text-right">
            <button
              hx-delete="/trays/{{.ID}}"
              hx-target="#tray-row-{{.ID}}"
              hx-swap="outerHTML"
              hx-confirm="Delete tray {{.Name}} and all its cells?"
              class="text-xs text-red-500 hover:text-red-700 hover:bg-red-50 px-2 py-1 rounded transition-colors">
              Delete
            </button>
          </td>
        </tr>
        {{end}}
      </tbody>
    </table>
  </div>
  {{else}}
  <div class="bg-stone-50 rounded-xl border border-gray-200 px-6 py-12 text-center">
    <div class="text-5xl mb-3">🌱</div>
    <p class="text-gray-500 text-sm">No trays yet.</p>
    <a href="/trays/new" class="mt-3 inline-block bg-green-600 text-white text-sm px-4 py-2 rounded-lg hover:bg-green-700">
      Add your first tray
    </a>
  </div>
  {{end}}

</div>
{{end}}
