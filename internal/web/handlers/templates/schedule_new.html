{{define "content"}}
<div class="max-w-lg space-y-4">

  <div class="flex items-center gap-3">
    <a href="/schedule" class="text-stone-400 hover:text-stone-200 text-sm">← Schedule</a>
    <h1 class="text-2xl font-bold text-stone-100">Add Planting Entry</h1>
  </div>

  <div class="bg-stone-50 rounded-xl border border-gray-200 p-6">
    <form method="POST" action="/schedule" class="space-y-4">

      <div class="grid grid-cols-2 gap-4">
        <div class="col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-1">Plant Name <span class="text-red-500">*</span></label>
          <input type="text" name="plant_name" required value="{{.PlantName}}"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-400"
            placeholder="e.g. Tomato">
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Type <span class="text-red-500">*</span></label>
          <select name="planting_type" required class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-400">
            <option value="direct_sow">Direct Sow</option>
            <option value="indoor_start">Indoor Start</option>
            <option value="transplant">Transplant</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Planned Date</label>
          <input type="date" name="planned_date"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-400">
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Location</label>
          <input type="text" name="location"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-400"
            placeholder="e.g. Raised Bed A">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Quantity</label>
          <input type="number" name="quantity" min="0"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-400">
        </div>
      </div>

      {{if .Seeds}}
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">From Seed Inventory</label>
        <select name="seed_id" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-400">
          <option value="">— none —</option>
          {{range .Seeds}}
          <option value="{{.ID}}">{{.Name}}{{if .Variety}} — {{.Variety}}{{end}} ({{.Quantity}} {{.Unit}})</option>
          {{end}}
        </select>
      </div>
      {{end}}

      {{if .Specs}}
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Plant Spec</label>
        <select name="plant_spec_id" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-400">
          <option value="">— none —</option>
          {{range .Specs}}
          <option value="{{.ID}}">{{.Name}}{{if .Variety}} — {{.Variety}}{{end}}</option>
          {{end}}
        </select>
      </div>
      {{end}}

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Notes</label>
        <textarea name="notes" rows="2"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-400"
          placeholder="Bed preparation, spacing notes, etc."></textarea>
      </div>

      <div class="flex gap-3 pt-2">
        <button type="submit" class="bg-green-600 text-white text-sm px-5 py-2 rounded-lg hover:bg-green-700 transition-colors">
          Schedule
        </button>
        <a href="/schedule" class="text-sm text-gray-500 hover:text-gray-700 px-5 py-2 rounded-lg border border-gray-200 hover:bg-stone-100">
          Cancel
        </a>
      </div>

    </form>
  </div>

</div>
{{end}}
