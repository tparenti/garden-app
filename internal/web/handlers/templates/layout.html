{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Garden Planner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { garden: { 50:'#f0fdf4',100:'#dcfce7',200:'#bbf7d0',500:'#22c55e',600:'#16a34a',700:'#15803d',800:'#166534',900:'#14532d' } } } }
    }
  </script>
  <style>
    .htmx-request { opacity: 0.5; transition: opacity 200ms; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

  <!-- Top nav -->
  <nav class="bg-green-800 shadow-md">
    <div class="max-w-6xl mx-auto px-4 flex items-center h-14 gap-1">
      <a href="/" class="flex items-center gap-2 font-bold text-white text-lg mr-4">
        <span class="text-2xl">🌱</span> Garden
      </a>
      {{$path := ""}}
      <a href="/"        class="px-3 py-1.5 rounded text-sm font-medium text-green-100 hover:bg-green-700 transition-colors">Dashboard</a>
      <a href="/seeds"   class="px-3 py-1.5 rounded text-sm font-medium text-green-100 hover:bg-green-700 transition-colors">Seeds</a>
      <a href="/plants"  class="px-3 py-1.5 rounded text-sm font-medium text-green-100 hover:bg-green-700 transition-colors">Plants</a>
      <a href="/schedule" class="px-3 py-1.5 rounded text-sm font-medium text-green-100 hover:bg-green-700 transition-colors">Schedule</a>
      <a href="/locale"  class="px-3 py-1.5 rounded text-sm font-medium text-green-100 hover:bg-green-700 transition-colors">Locale</a>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-4 py-6">
    {{if .Flash}}
    <div class="mb-5 flex items-center gap-2 p-3 bg-green-50 border border-green-300 text-green-800 rounded-lg text-sm">
      <span>✓</span> {{.Flash}}
    </div>
    {{end}}
    {{if .Error}}
    <div class="mb-5 flex items-center gap-2 p-3 bg-red-50 border border-red-300 text-red-700 rounded-lg text-sm">
      <span>⚠</span> {{.Error}}
    </div>
    {{end}}
    {{template "content" .}}
  </main>

</body>
</html>
{{end}}
