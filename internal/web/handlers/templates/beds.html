{{define "content"}}
<div class="space-y-4">

  <!-- Page hero -->
  <div class="rounded-xl bg-gradient-to-r from-lime-900 to-stone-800 border border-stone-700 px-6 py-5 flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold text-white">Raised Beds</h1>
      <p class="text-stone-300 text-sm mt-0.5">Manage your planting space</p>
    </div>
    <div class="flex items-center gap-4">
      <div class="text-4xl select-none">🏡 🌿 🪱</div>
      <a href="/beds/new" class="bg-green-600 text-white text-sm px-4 py-2 rounded-lg hover:bg-green-700 transition-colors">+ New Bed</a>
    </div>
  </div>

  {{if .Beds}}
  <div class="bg-stone-50 rounded-xl border border-gray-200 overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-stone-100 text-gray-500 text-xs uppercase border-b border-gray-200">
        <tr>
          <th class="px-5 py-3 text-left">Name</th>
          <th class="px-5 py-3 text-left">Size</th>
          <th class="px-5 py-3 text-left">Created</th>
          <th class="px-5 py-3 text-left"></th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-100">
        {{range .Beds}}
        <tr id="bed-row-{{.ID}}" class="hover:bg-stone-100 transition-colors">
          <td class="px-5 py-3 font-medium text-gray-800">
            <a href="/beds/{{.ID}}" class="hover:text-green-600 hover:underline">{{.Name}}</a>
          </td>
          <td class="px-5 py-3 text-gray-500">{{.Rows}} × {{.Cols}} cells</td>
          <td class="px-5 py-3 text-gray-400">{{formatDate .CreatedAt}}</td>
          <td class="px-5 py-3 text-right">
            <button
              hx-delete="/beds/{{.ID}}"
              hx-target="#bed-row-{{.ID}}"
              hx-swap="outerHTML"
              hx-confirm="Delete bed {{.Name}} and all its cells?"
              class="text-xs text-red-500 hover:text-red-700 hover:bg-red-50 px-2 py-1 rounded transition-colors">
              Delete
            </button>
          </td>
        </tr>
        {{end}}
      </tbody>
    </table>
  </div>
  {{else}}
  <div class="bg-stone-50 rounded-xl border border-gray-200 px-6 py-12 text-center">
    <div class="text-5xl mb-3">🪴</div>
    <p class="text-gray-500 text-sm">No raised beds yet.</p>
    <a href="/beds/new" class="mt-3 inline-block bg-green-600 text-white text-sm px-4 py-2 rounded-lg hover:bg-green-700">
      Add your first bed
    </a>
  </div>
  {{end}}

</div>
{{end}}
