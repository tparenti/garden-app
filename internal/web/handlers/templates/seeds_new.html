{{define "content"}}
<div class="max-w-lg space-y-4">

  <div class="flex items-center gap-3">
    <a href="/seeds" class="text-stone-400 hover:text-stone-200 text-sm">← Seeds</a>
    <h1 class="text-2xl font-bold text-stone-100">Add Seed</h1>
  </div>

  <div class="bg-stone-50 rounded-xl border border-gray-200 p-6">
    <form method="POST" action="/seeds" class="space-y-4">

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Plant Name <span class="text-red-500">*</span></label>
          <input type="text" name="name" required
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-400"
            placeholder="e.g. Tomato">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Variety</label>
          <input type="text" name="variety"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-400"
            placeholder="e.g. Cherokee Purple">
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Quantity</label>
          <input type="number" name="quantity" value="1" min="0"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-400">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Unit</label>
          <select name="unit" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-400">
            <option value="packets">Packets</option>
            <option value="grams">Grams</option>
            <option value="seeds">Seeds</option>
          </select>
        </div>
      </div>

      {{if .Specs}}
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Link to Plant Spec</label>
        <select name="plant_spec_id" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-400">
          <option value="">— none —</option>
          {{range .Specs}}
          <option value="{{.ID}}">{{.Name}}{{if .Variety}} — {{.Variety}}{{end}}</option>
          {{end}}
        </select>
      </div>
      {{end}}

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Notes</label>
        <textarea name="notes" rows="2"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-400"
          placeholder="Source, storage notes, etc."></textarea>
      </div>

      <div class="flex gap-3 pt-2">
        <button type="submit" class="bg-green-600 text-white text-sm px-5 py-2 rounded-lg hover:bg-green-700 transition-colors">
          Add Seed
        </button>
        <a href="/seeds" class="text-sm text-gray-500 hover:text-gray-700 px-5 py-2 rounded-lg border border-gray-200 hover:bg-stone-100">
          Cancel
        </a>
      </div>

    </form>
  </div>

</div>
{{end}}
