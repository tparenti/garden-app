{{define "content"}}
<div class="max-w-lg space-y-4">

  <div class="flex items-center justify-between">
    <h1 class="text-2xl font-bold text-stone-100">New Tray</h1>
    <a href="/trays" class="text-sm text-stone-400 hover:text-stone-200">← Back</a>
  </div>

  <div class="bg-stone-50 rounded-xl border border-gray-200 p-6">
    <form method="POST" action="/trays" class="space-y-5">

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
        <input type="text" name="name" placeholder="e.g. Spring 2026 Starts"
               class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-400"
               autofocus required>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Size</label>
        <div class="grid grid-cols-4 gap-2 mb-3">
          {{range $s := $.Sizes}}
          <label class="flex items-center justify-center border border-gray-200 rounded-lg py-2 px-1 text-sm cursor-pointer hover:border-green-400 hover:bg-green-50 transition-colors">
            <input type="radio" name="size" value="{{$s}}" class="sr-only"> {{$s}}
          </label>
          {{end}}
        </div>
        <div class="flex items-center gap-2 text-sm text-gray-500">
          <span>or custom:</span>
          <input type="number" name="rows" min="1" max="50" placeholder="rows"
                 class="w-20 border border-gray-200 rounded px-2 py-1 text-sm">
          <span>×</span>
          <input type="number" name="cols" min="1" max="50" placeholder="cols"
                 class="w-20 border border-gray-200 rounded px-2 py-1 text-sm">
        </div>
      </div>

      <div class="flex gap-3 pt-2">
        <button type="submit" class="bg-green-600 text-white text-sm px-5 py-2 rounded-lg hover:bg-green-700 transition-colors">
          Create Tray
        </button>
        <a href="/trays" class="text-sm text-gray-500 hover:text-gray-700 px-3 py-2">Cancel</a>
      </div>

    </form>
  </div>

</div>
{{end}}
